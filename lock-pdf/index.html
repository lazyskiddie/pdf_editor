<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock PDF - SecurePDF</title>
    <meta name="description" content="Add password protection to your PDF. Free, secure, no uploads.">
    <link rel="stylesheet" href="../style.css">
</head>
<body data-theme="light">
 
<header class="header">
    <nav class="nav">
        <a href="../index.html" class="logo">📄 SecurePDF</a>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="#" onclick="showModal('privacy');return false;">Privacy</a></li>
                <li><a href="#" onclick="showModal('terms');return false;">Terms</a></li>
                <li><a href="#" onclick="showModal('contact');return false;">Contact</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
        </div>
    </nav>
</header>
 
<div class="container">
    <a href="../index.html" class="back-link">← Back to all tools</a>
 
    <div class="tool-page-hero">
        <h1>🔒 Lock PDF</h1>
        <p>Add password protection to your PDF. Your file never leaves your device.</p>
    </div>
 
    <div class="tool-workspace">
 
        <!-- Drop zone -->
        <div id="dropZoneArea">
            <div class="drop-zone" id="dropZone">
                <span class="upload-icon">🔒</span>
                <h3>Drop PDF here or click to browse</h3>
                <p>No sign-up required · Fast and private</p>
                <input type="file" id="fileInput" accept=".pdf">
            </div>
        </div>
<!-- Password form -->
        <div id="passwordForm" style="display:none;max-width:460px;margin:0 auto;padding:2rem 0;">
            <div style="text-align:center;margin-bottom:2rem;">
                <div style="font-size:4rem;">🔒</div>
                <h3 style="margin:1rem 0 0.5rem;">Secure Your PDF</h3>
                <p style="color:var(--text-secondary);" id="selectedFileName"></p>
            </div>
            <div class="form-group">
                <label for="passInput">Password</label>
                <input type="password" id="passInput" placeholder="Enter password (min. 4 characters)">
            </div>
            <div class="form-group">
                <label for="passConfirm">Confirm Password</label>
                <input type="password" id="passConfirm" placeholder="Re-enter password">
            </div>
            <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                <button class="btn" style="flex:1;" onclick="lockPDF()">🔐 Lock PDF</button>
                <button class="btn btn-secondary" style="flex:1;" onclick="location.reload()">Cancel</button>
            </div>
        </div>
